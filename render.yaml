databases:
  - name: codifyx-db
    databaseName: codifyx
    user: codifyx_admin
    plan: free

services:
  # 1. Public API Web Service
  - type: web
    name: codifyx-public-api
    env: node
    buildCommand: npm install
    startCommand: node apps/public-api/server.js
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codifyx-db
          property: connectionString
      - key: JWT_SECRET
        value: "codifyx_shared_super_secure_jwt_secret_2026_x99"
      - key: NODE_ENV
        value: production
      - key: DEBUG_OTP
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://codifyx-solutions.web.app,https://codifyx-solutions-worker.web.app,https://codifyx-solutions-admin.web.app,http://localhost:3000,http://localhost:3002"

  # 2. Admin API Web Service
  - type: web
    name: codifyx-admin-api
    env: node
    buildCommand: npm install
    startCommand: node apps/admin-api/server.js
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codifyx-db
          property: connectionString
      - key: JWT_SECRET
        value: "codifyx_shared_super_secure_jwt_secret_2026_x99"
      - key: NODE_ENV
        value: production
      - key: ADMIN_WHITELIST_IPS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://codifyx-solutions.web.app,https://codifyx-solutions-worker.web.app,https://codifyx-solutions-admin.web.app,http://localhost:3000,http://localhost:3002"
