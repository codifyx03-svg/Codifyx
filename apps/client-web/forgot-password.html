<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - codifyx</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-glow-orb orb-1"></div>

  <div class="auth-wrapper">
    <div class="glass-card auth-card">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <img src="/uploads/logo.png" alt="codifyx Logo" class="logo-icon" style="width:30px; height:30px; margin-right:0.5rem; vertical-align:middle;" />
          codifyx
        </a>
        <h2 class="auth-title">Reset Password</h2>
        <p class="auth-subtitle" id="reset-sub">Recover your credentials quickly</p>
      </div>

      <!-- Step 1: Request Code -->
      <form id="request-code-form">
        <div class="form-group">
          <label for="req-email">Email Address</label>
          <input type="email" id="req-email" required placeholder="john@company.com">
        </div>
        <button type="submit" class="btn btn-primary auth-btn">Send Recovery Code</button>
      </form>

      <!-- Step 2: Set New Password (hidden initially) -->
      <form id="reset-password-form" style="display:none">
        <div class="form-group">
          <label for="reset-email">Email Address</label>
          <input type="email" id="reset-email" readonly>
        </div>
        <div class="form-group">
          <label for="code">Verification Code</label>
          <input type="text" id="code" required placeholder="123456" style="text-align: center; font-size: 1.25rem; letter-spacing: 0.25em" maxlength="6">
        </div>
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" required placeholder="••••••••" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary auth-btn">Update Password</button>
      </form>

      <p class="auth-footer-text">
        Remembered your password? <a href="login.html">Log In</a>
      </p>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    const requestForm = document.getElementById('request-code-form');
    const resetForm = document.getElementById('reset-password-form');

    requestForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('req-email').value;

      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to dispatch code');

        showToast(data.message, 'success');
        alert(`[codifyx Recovery Code]\n\nFor simulation: Use code: ${data.code}`);

        // Transition forms
        document.getElementById('reset-email').value = email;
        requestForm.style.display = 'none';
        resetForm.style.display = 'block';
        document.getElementById('reset-sub').innerText = 'Enter the recovery code and your new password';

      } catch (err) {
        showToast(err.message, 'error');
      }
    });

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('reset-email').value;
      const code = document.getElementById('code').value;
      const newPassword = document.getElementById('new-password').value;

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, code, newPassword })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to reset password');

        showToast('Password updated successfully! Redirecting to login...', 'success');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);

      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
